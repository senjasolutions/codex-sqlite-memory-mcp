name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run core verification
        run: npm run verify

      - name: Run path verification
        run: npm run verify:paths

      - name: Run protocol regression tests
        run: npm run verify:protocol

      - name: Run secret regression tests
        run: npm run verify:secrets

      - name: Run storage regression tests
        run: npm run verify:storage
